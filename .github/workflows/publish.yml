name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with v (e.g., v1.5.0-beta)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Patch README links for PyPI
        run: |
          # Replaces relative links like (docs/file.md) with (https://github.com)
          # This only affects the ephemeral file in the runner, not your repo.
          sed -i "s|(\(docs/[^)]*\))|(https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/\1)|g" README.md

      - name: Check patched links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          file-path: ./README.md

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Required for Trusted Publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
