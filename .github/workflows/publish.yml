name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with v (e.g., v1.5.0-beta)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for creating the release and uploading files
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' # Use modern Python for the build process

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Source Distribution and Wheel
        # This generates files in the dist/ directory
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }} # Auto-marks v1.5.0-beta as pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
